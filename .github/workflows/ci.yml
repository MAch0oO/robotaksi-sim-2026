name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Linter (flake8)
        run: |
          # Sözdizimi/ciddi hatalar -> başarısız; stil uyarıları -> bilgilendirme
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src tests --count --max-line-length=120 --exit-zero --statistics

      - name: Testler (pytest)
        run: |
          status=0
          pytest tests -q || status=$?
          # exit 5 = "toplanacak test yok" -> başarı say (üst seviye testler henüz yok)
          if [ "$status" -eq 5 ]; then
            echo "Üst seviye tests/ içinde test yok, adım atlandı."
            exit 0
          fi
          exit "$status"
